[options]
; ============================================================
; Odoo 配置文件
; ============================================================

; ------------------------------------------------------------
; 数据库配置
; ------------------------------------------------------------
db_host = postgres
db_port = 5432
db_user = odoo
db_password = Clt@123456
db_maxconn = 64
db_name = odoo
db_template = template0

; ------------------------------------------------------------
; 服务器配置
; ------------------------------------------------------------
; HTTP 服务
http_enable = True
http_interface = 0.0.0.0
http_port = 8069

; Long Polling (实时通信)
longpolling_port = 8072

; 代理模式（如果在 Nginx 后面，设置为 True）
proxy_mode = False

; ------------------------------------------------------------
; 工作进程配置
; ------------------------------------------------------------
; 工作进程数（0 = 自动，推荐：CPU * 2 + 1）
workers = 4

; 最大定时任务线程数
max_cron_threads = 2

; ------------------------------------------------------------
; 内存和资源限制
; ------------------------------------------------------------
; 软内存限制（2GB）
limit_memory_soft = 2147483648

; 硬内存限制（2.5GB）
limit_memory_hard = 2684354560

; CPU 时间限制（秒）
limit_time_cpu = 600

; 实际时间限制（秒）
limit_time_real = 1200

; 请求限制
limit_request = 8192

; ------------------------------------------------------------
; 日志配置
; ------------------------------------------------------------
; 日志级别：debug, debug_rpc, debug_sql, info, warn, error, critical
log_level = info

; 日志处理器：False（控制台）, :stdout, stderr, 或文件路径
log_handler = :stdout

; 是否记录数据库查询
log_db = False

; 是否记录 SQL 查询
log_db_level = warning

; ------------------------------------------------------------
; 安全配置
; ------------------------------------------------------------
; 主密码（用于数据库管理操作）
admin_passwd = Clt@123456

; 允许的数据库列表（逗号分隔，空=全部）
;dbfilter = ^odoo$

; 禁用数据库管理界面
;list_db = False

; ------------------------------------------------------------
; 文件存储配置
; ------------------------------------------------------------
; 数据目录
data_dir = /var/lib/odoo

; 附件存储位置：filesystem 或 db
; data_dir = /var/lib/odoo/filestore

; ------------------------------------------------------------
; 模块配置
; ------------------------------------------------------------
; 额外的模块路径（逗号分隔）
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; 服务器范围的模块（逗号分隔）
;server_wide_modules = base,web

; ------------------------------------------------------------
; 会话配置
; ------------------------------------------------------------
; 会话存储目录
;server_wide_modules = web,base

; ------------------------------------------------------------
; 邮件配置（根据需要配置）
; ------------------------------------------------------------
; SMTP 服务器
;smtp_server = smtp.gmail.com
;smtp_port = 587
;smtp_ssl = False
;smtp_user = your-email@gmail.com
;smtp_password = your-app-password

; 默认发件人
;email_from = noreply@example.com

; ------------------------------------------------------------
; 开发配置（生产环境请注释掉）
; ------------------------------------------------------------
; 开发模式（自动重载）
;dev_mode = reload

; 调试模式
;debug_mode = False

; 启用测试
;test_enable = False

; 测试提交（测试后是否提交数据库更改）
;test_commit = False

; ------------------------------------------------------------
; 其他配置
; ------------------------------------------------------------
; 时区
;timezone = Asia/Shanghai

; 翻译文件更新模式
;translate_modules = ['all']

; 不加载演示数据
;without_demo = True

; CSV 分隔符
;csv_internal_sep = ,

; 报告目录
;reportgz = False

; 启用代码覆盖率
;coverage = False
