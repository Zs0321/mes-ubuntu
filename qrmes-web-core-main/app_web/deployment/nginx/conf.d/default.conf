# Flask 应用上游服务器
upstream flask_backend {
    server flask-app:5001 max_fails=3 fail_timeout=30s;
    # 如果有多个 Flask 实例，可以添加更多 server 行实现负载均衡
    # server flask-app-2:5001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP 服务器配置
server {
    listen 80;
    server_name _;  # 接受所有域名，生产环境建议改为实际域名

    # 字符集
    charset utf-8;

    # 访问日志
    access_log /var/log/nginx/qrmes-access.log main;
    error_log /var/log/nginx/qrmes-error.log;

    # 安全头部
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 健康检查端点
    location /health {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # 静态文件（如果有）
    location /static {
        alias /app/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 照片访问优化（可选）
    # location /photos {
    #     alias /app/nas-mount/qrmes/picture;
    #     expires 7d;
    #     add_header Cache-Control "public";
    # }

    # 反向代理到 Flask 应用
    location / {
        proxy_pass http://flask_backend;
        
        # 代理头部
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（如果需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 90s;
        proxy_send_timeout 90s;
        proxy_read_timeout 90s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # 文件上传接口（需要更长的超时）
    location ~ ^/(upload|import) {
        proxy_pass http://flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 更长的超时时间
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # 更大的 body 限制
        client_max_body_size 500M;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

