version: '3.8'

services:
  # Flask 应用服务
  flask-app:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
    container_name: qrmes-flask-app
    restart: unless-stopped
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - FLASK_DEBUG=${FLASK_DEBUG:-False}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - DATABASE_PATH=/app/data/databases
      - LOG_PATH=/app/data/logs
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - NAS_MOUNT_POINT=/app/nas-mount/qrmes
      - PHOTO_BASE_PATH=/app/nas-mount/qrmes/picture
      - SYNOLOGY_API_URL=${SYNOLOGY_API_URL}
      - SYNOLOGY_API_VERIFY_SSL=${SYNOLOGY_API_VERIFY_SSL:-true}
    volumes:
      # 应用代码（开发时可挂载，生产环境可省略）
      # - ../:/app:ro
      # 持久化数据
      - ./data/databases:/app/data/databases
      - ./data/logs:/app/data/logs
      - ./data/cache:/app/data/cache
      - ./data/config:/app/data/config
      # NAS 挂载点（主机已挂载 NAS，容器共享挂载点）
      - ${NAS_HOST_MOUNT_PATH:-./nas-mount}:/app/nas-mount:rw
    depends_on:
      - redis
    networks:
      - qrmes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx 反向代理
  nginx:
    image: nginx:1.24-alpine
    container_name: qrmes-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./data/logs/nginx:/var/log/nginx
      # 如果需要 SSL 证书
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # 静态文件（可选，用于优化静态资源访问）
      - ../static:/app/static:ro
    depends_on:
      - flask-app
    networks:
      - qrmes-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: qrmes-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - ./data/redis:/data
    networks:
      - qrmes-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 监控服务（可选，生产环境推荐）
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: qrmes-prometheus
  #   restart: unless-stopped
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - ./data/prometheus:/prometheus
  #   networks:
  #     - qrmes-network

  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: qrmes-grafana
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
  #   volumes:
  #     - ./data/grafana:/var/lib/grafana
  #   networks:
  #     - qrmes-network

networks:
  qrmes-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  # 声明命名卷（可选，用于更好的管理）
  databases:
  logs:
  cache:
  redis-data:
