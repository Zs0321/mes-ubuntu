<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工序配置管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.css" rel="stylesheet">
    <style>
        .product-type-card {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .product-type-header {
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 1px solid #dee2e6;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .product-type-header:hover {
            background: #e9ecef;
        }
        
        .product-type-header.collapsed {
            border-bottom: none;
        }
        
        .product-type-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .product-type-name {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .collapse-icon {
            transition: transform 0.3s;
        }
        
        .collapse-icon.collapsed {
            transform: rotate(-90deg);
        }
        
        .product-type-body {
            padding: 15px;
        }
        
        .materials-section {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #dee2e6;
        }
        
        .materials-list {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }
        
        .process-section-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .process-item {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            margin-bottom: 10px;
            padding: 12px;
            cursor: move;
            transition: all 0.3s ease;
        }
        
        .process-item:hover {
            background: #e9ecef;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .process-item.sortable-ghost {
            opacity: 0.4;
        }
        
        .process-item.sortable-chosen {
            background: #e3f2fd;
        }
        
        .drag-handle {
            cursor: grab;
            color: #6c757d;
            margin-right: 10px;
        }
        
        .drag-handle:active {
            cursor: grabbing;
        }
        
        .process-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .process-title {
            display: flex;
            align-items: center;
            font-weight: 600;
        }
        
        .process-order {
            background: #007bff;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            margin-right: 10px;
        }
        
        .process-actions {
            display: flex;
            gap: 5px;
        }
        
        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }
        
        .empty-processes {
            text-align: center;
            padding: 30px;
            color: #6c757d;
            background: #f8f9fa;
            border-radius: 6px;
        }
        
        .config-sidebar {
            background: #f8f9fa;
            border-right: 1px solid #dee2e6;
            height: 100vh;
            overflow-y: auto;
        }
        
        .project-item {
            padding: 10px 15px;
            border-bottom: 1px solid #dee2e6;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .project-item:hover {
            background: #e9ecef;
        }
        
        .project-item.active {
            background: #007bff;
            color: white;
        }
        
        .main-content {
            height: 100vh;
            overflow-y: auto;
        }
        
        .toolbar {
            background: white;
            border-bottom: 1px solid #dee2e6;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        
        .empty-state i {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .version-badge {
            font-size: 0.75rem;
            margin-left: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        
        .process-details {
            background: white;
            border-radius: 4px;
            padding: 10px;
            margin-top: 10px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.875rem;
        }
        
        .detail-label {
            color: #6c757d;
            font-weight: 500;
        }
        
        .modal-body .form-group {
            margin-bottom: 1rem;
        }
        
        .form-check {
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 - 项目列表 -->
            <div class="col-md-3 config-sidebar">
                <div class="p-3">
                    <h5 class="mb-3">
                        <i class="fas fa-project-diagram me-2"></i>
                        项目列表
                    </h5>
                    <button class="btn btn-primary btn-sm mb-3" onclick="showCreateProjectModal()">
                        <i class="fas fa-plus me-1"></i>
                        新建项目
                    </button>
                </div>
                <div id="projectList" class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <div>加载中...</div>
                </div>
            </div>
            
            <!-- 主内容区 -->
            <div class="col-md-9 main-content">
                <!-- 工具栏 -->
                <div class="toolbar">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h4 class="mb-0" id="currentProjectTitle">工序配置管理</h4>
                            <small class="text-muted" id="currentProjectInfo"></small>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-outline-secondary btn-sm" onclick="exportConfig()" id="exportBtn" disabled>
                                <i class="fas fa-download me-1"></i>
                                导出配置
                            </button>
                            <button class="btn btn-outline-secondary btn-sm" onclick="showImportModal()" id="importBtn" disabled>
                                <i class="fas fa-upload me-1"></i>
                                导入配置
                            </button>
                            <button class="btn btn-outline-info btn-sm" onclick="showVersionHistory()" id="versionBtn" disabled>
                                <i class="fas fa-history me-1"></i>
                                版本历史
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- 迁移提示 -->
                <div id="migrationAlert" class="alert alert-warning mx-3 mb-3" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            <strong>检测到旧版本配置</strong>
                            <p class="mb-0 mt-1">您的配置使用旧的数据结构，建议迁移到新版本以支持基于产品类型的工序管理。</p>
                        </div>
                        <button class="btn btn-warning btn-sm" onclick="migrateConfig()">
                            <i class="fas fa-sync-alt me-1"></i>
                            立即迁移
                        </button>
                    </div>
                </div>
                
                <!-- 产品类型和工序列表 -->
                <div class="px-3">
                    <div id="productTypeListContainer">
                        <div class="empty-state">
                            <i class="fas fa-cogs"></i>
                            <h5>请选择一个项目</h5>
                            <p>从左侧项目列表中选择一个项目来管理其工序配置</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑工序模态框 -->
    <div class="modal fade" id="processModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="processModalTitle">添加工序</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="processForm">
                        <input type="hidden" id="processId">
                        <input type="hidden" id="processProductType">
                        <div class="form-group">
                            <label for="productTypeSelect" class="form-label">产品类型 *</label>
                            <select class="form-select" id="productTypeSelect" required>
                                <option value="">请选择产品类型</option>
                            </select>
                            <div class="form-text">工序必须关联到一个产品类型</div>
                        </div>
                        <div class="form-group">
                            <label for="processName" class="form-label">工序名称 *</label>
                            <input type="text" class="form-control" id="processName" required>
                        </div>
                        <div class="form-group">
                            <label for="processDescription" class="form-label">工序描述</label>
                            <textarea class="form-control" id="processDescription" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="processOrder" class="form-label">执行顺序</label>
                                    <input type="number" class="form-control" id="processOrder" min="1">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group">
                                    <label for="estimatedDuration" class="form-label">预计耗时(秒)</label>
                                    <input type="number" class="form-control" id="estimatedDuration" min="0" value="300">
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="processRequired" checked>
                                <label class="form-check-label" for="processRequired">
                                    必需工序
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="photoRequired" checked>
                                <label class="form-check-label" for="photoRequired">
                                    需要拍照记录
                                </label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveProcess()">保存</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 迁移进度模态框 -->
    <div class="modal fade" id="migrationModal" tabindex="-1" data-bs-backdrop="static" data-bs-keyboard="false">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">配置迁移</h5>
                </div>
                <div class="modal-body">
                    <div id="migrationProgress">
                        <div class="text-center mb-3">
                            <i class="fas fa-spinner fa-spin fa-3x text-primary"></i>
                        </div>
                        <h6 class="text-center">正在迁移配置...</h6>
                        <p class="text-center text-muted mb-0">请稍候，正在将配置迁移到新的数据结构</p>
                    </div>
                    <div id="migrationResult" style="display: none;">
                        <div class="text-center mb-3">
                            <i class="fas fa-check-circle fa-3x text-success" id="migrationSuccessIcon"></i>
                            <i class="fas fa-times-circle fa-3x text-danger" id="migrationErrorIcon" style="display: none;"></i>
                        </div>
                        <h6 class="text-center" id="migrationResultTitle">迁移成功</h6>
                        <p class="text-center text-muted" id="migrationResultMessage"></p>
                    </div>
                </div>
                <div class="modal-footer" id="migrationFooter" style="display: none;">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 创建项目模态框 -->
    <div class="modal fade" id="createProjectModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">创建新项目</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createProjectForm">
                        <div class="form-group">
                            <label for="newProjectName" class="form-label">项目名称 *</label>
                            <input type="text" class="form-control" id="newProjectName" required>
                        </div>
                        <div class="form-group">
                            <label for="newProjectDescription" class="form-label">项目描述</label>
                            <textarea class="form-control" id="newProjectDescription" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="createProject()">创建</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 导入配置模态框 -->
    <div class="modal fade" id="importModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">导入配置</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="importFile" class="form-label">选择配置文件</label>
                        <input type="file" class="form-control" id="importFile" accept=".json">
                        <div class="form-text">支持JSON格式的配置文件</div>
                    </div>
                    <div class="form-group">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="backupBeforeImport" checked>
                            <label class="form-check-label" for="backupBeforeImport">
                                导入前备份当前配置
                            </label>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="importConfig()">导入</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 版本历史模态框 -->
    <div class="modal fade" id="versionModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">版本历史</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="versionList" class="loading">
                        <i class="fas fa-spinner fa-spin"></i>
                        <div>加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="{{ url_for('static', filename='js/process-config.js') }}"></script>
</body>
</html>
