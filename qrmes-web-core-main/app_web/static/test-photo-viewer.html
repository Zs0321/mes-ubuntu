<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>照片查看器测试</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/photo-viewer.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .test-image {
            width: 200px;
            height: 150px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid #ddd;
            border-radius: 4px;
            margin: 10px;
        }
        .test-image:hover {
            border-color: #667eea;
        }
        .btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover {
            background: #5568d3;
        }
        .status {
            margin: 20px 0;
            padding: 15px;
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>📸 照片查看器测试页面</h1>
        
        <div class="status">
            <strong>状态：</strong>
            <span id="status">正在检查...</span>
        </div>
        
        <h3>测试图片</h3>
        <p>点击图片或按钮测试照片查看器功能</p>
        
        <div>
            <img src="https://via.placeholder.com/800x600/667eea/ffffff?text=Test+Image+1" 
                 class="test-image" 
                 onclick="testViewer(this.src, 'Test Image 1', 102400)">
            
            <img src="https://via.placeholder.com/800x600/48bb78/ffffff?text=Test+Image+2" 
                 class="test-image" 
                 onclick="testViewer(this.src, 'Test Image 2', 204800)">
            
            <img src="https://via.placeholder.com/800x600/f6993f/ffffff?text=Test+Image+3" 
                 class="test-image" 
                 onclick="testViewer(this.src, 'Test Image 3', 307200)">
        </div>
        
        <div style="margin-top: 20px;">
            <button class="btn" onclick="testViewer('https://via.placeholder.com/1920x1080/e74c3c/ffffff?text=Large+Image', 'Large Test Image', 1048576)">
                测试大图
            </button>
            <button class="btn" onclick="checkStatus()">
                检查状态
            </button>
        </div>
        
        <h3 style="margin-top: 30px;">功能说明</h3>
        <ul>
            <li><strong>缩放：</strong>鼠标滚轮 或 +/- 按钮</li>
            <li><strong>移动：</strong>拖拽照片（缩放后）</li>
            <li><strong>重置：</strong>双击照片 或 按 0 键</li>
            <li><strong>全屏：</strong>按 F 键</li>
            <li><strong>关闭：</strong>按 ESC 键</li>
        </ul>
    </div>
    
    <script src="/static/js/photo-viewer.js"></script>
    <script>
        function testViewer(url, name, size) {
            console.log('测试照片查看器:', url);
            if (typeof window.openPhotoViewer === 'function') {
                window.openPhotoViewer(url, name, size);
            } else {
                alert('照片查看器未加载！请检查 photo-viewer.js 是否正确加载。');
            }
        }
        
        function checkStatus() {
            const status = document.getElementById('status');
            const checks = [];
            
            // 检查 photo-viewer.js 是否加载
            if (typeof window.openPhotoViewer === 'function') {
                checks.push('✓ openPhotoViewer 函数已加载');
            } else {
                checks.push('✗ openPhotoViewer 函数未加载');
            }
            
            // 检查 PhotoViewer 类是否存在
            if (typeof PhotoViewer !== 'undefined') {
                checks.push('✓ PhotoViewer 类已定义');
            } else {
                checks.push('✗ PhotoViewer 类未定义');
            }
            
            // 检查查看器容器是否存在
            if (document.getElementById('photoViewer')) {
                checks.push('✓ 查看器容器已创建');
            } else {
                checks.push('✗ 查看器容器未创建');
            }
            
            status.innerHTML = checks.join('<br>');
        }
        
        // 页面加载后检查状态
        window.addEventListener('load', function() {
            setTimeout(checkStatus, 500);
        });
    </script>
</body>
</html>
