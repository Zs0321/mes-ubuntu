<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}QRMES Finance Demo{% endblock %}</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #eef3f7; color: #102131; }
    .container { width: min(1480px, calc(100vw - 24px)); margin: 0 auto; padding: 12px; }
    .flash-messages { display: grid; gap: 8px; margin: 12px 0; }
    .flash { padding: 10px 12px; border-radius: 10px; background: #fff7d6; border: 1px solid #f0d98a; color: #6f5200; }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages">
          {% for category, message in messages %}
            <div class="flash flash-{{ category|default('info') }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
