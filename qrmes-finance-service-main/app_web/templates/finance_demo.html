{% block extra_js %}
<script>
(function () {
    function applyFinanceModule(target) {
        if (!target) return;
        document.querySelectorAll('[data-finance-module-target]').forEach((node) => {
            node.classList.toggle('active', node.dataset.financeModuleTarget === target);
        });
        document.querySelectorAll('.finance-module-section').forEach((node) => {
            node.classList.toggle('active', node.dataset.financeModule === target);
        });
    }

    document.addEventListener('click', function (event) {
        const trigger = event.target.closest('[data-finance-module-target]');
        if (!trigger) return;
        const target = trigger.dataset.financeModuleTarget || 'warehouse-recheck';
        applyFinanceModule(target);
        document.querySelector('.finance-module-section[data-finance-module="' + target + '"]')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    window.financeDemoApplyModuleFallback = applyFinanceModule;
})();
</script>
<script src="/finance-demo/app.js?v=20260424-ui-wide-fix5"></script>
<script>
window.addEventListener('load', function () {
    try {
        if (typeof ensureExcelQuoteProgressUi === 'function') ensureExcelQuoteProgressUi();
        if (typeof ensureAiRouteProgressUi === 'function') ensureAiRouteProgressUi();

        function bindExcelFallback() {
            const quoteBtn = document.getElementById('quoteExcelBtn');
            const fileInput = document.getElementById('excelQuoteFile');
            const pasteText = document.getElementById('excelQuotePasteText');
            const useResultBtn = document.getElementById('useExcelScenarioBtn');

            const prepareSubmission = function (stageDetail, statusText) {
                if (typeof state === 'undefined') return 0;
                state.financeModule = 'excel-quote';
                if (typeof renderFinanceModules === 'function') renderFinanceModules();
                const pollToken = typeof nextExcelQuotePollToken === 'function' ? nextExcelQuotePollToken() : 0;
                state.lastExcelQuotePayload = null;
                if (typeof renderExcelQuoteExports === 'function') renderExcelQuoteExports(null);
                if (typeof resetExcelQuoteProgress === 'function') resetExcelQuoteProgress();
                if (typeof renderExcelQuoteProgress === 'function') {
                    renderExcelQuoteProgress({
                        stage: 'queued',
                        stageTag: '\u5df2\u63d0\u4ea4',
                        stageLabel: '\u4efb\u52a1\u5df2\u63d0\u4ea4',
                        percent: 4,
                        detail: stageDetail,
                        hint: '\u6b63\u5728\u521b\u5efa\u62a5\u4ef7\u4efb\u52a1\uff0c\u9a6c\u4e0a\u5f00\u59cb\u8bfb\u53d6\u62a5\u4ef7\u8868\u6570\u636e',
                    }, true);
                }
                document.getElementById('excelQuoteProgressPanel')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                const statusNode = document.getElementById('excelQuoteStatus');
                if (statusNode) statusNode.textContent = statusText;
                return pollToken;
            };

            if (quoteBtn && quoteBtn.dataset.fallbackBound !== '1') {
                quoteBtn.onclick = function () {
                    const file = fileInput?.files?.[0];
                    const tableText = pasteText?.value || '';
                    const trimmedTableText = String(tableText || '').trim();

                    if (file && trimmedTableText) {
                        alert('\u0045\u0078\u0063\u0065\u006c \u6587\u4ef6\u548c\u7c98\u8d34\u6570\u636e\u4e0d\u80fd\u540c\u65f6\u5b58\u5728\uff0c\u8bf7\u53ea\u4fdd\u7559\u4e00\u79cd\u8f93\u5165\u65b9\u5f0f');
                        return;
                    }

                    if (file) {
                        const pollToken = prepareSubmission('\u7b49\u5f85\u670d\u52a1\u5f00\u59cb\u5904\u7406\u4e0a\u4f20\u6587\u4ef6', '\u62a5\u4ef7\u4efb\u52a1\u5df2\u63d0\u4ea4');
                        quoteExcelWorkbook(file, document.getElementById('excelQuoteModelLabel')?.value || '', getExcelQuoteOptions())
                            .then((task) => {
                                if (task.error) throw new Error(task.message || task.error);
                                if (typeof state !== 'undefined') state.excelQuoteTaskId = task.task_id || null;
                                if (typeof syncExcelQuoteTaskUi === 'function') syncExcelQuoteTaskUi(task);
                                if (typeof pollExcelQuoteTask === 'function') pollExcelQuoteTask(task.task_id, pollToken);
                            })
                            .catch((err) => {
                                const statusNode = document.getElementById('excelQuoteStatus');
                                if (statusNode) statusNode.textContent = '\u62a5\u4ef7\u5931\u8d25';
                                alert(`Excel \u62a5\u4ef7\u5931\u8d25\uff1a${err.message}`);
                            });
                        return;
                    }

                    const recognized = typeof analyzePastedExcelTable === 'function'
                        ? analyzePastedExcelTable(trimmedTableText)
                        : { ok: false };
                    if (typeof renderExcelPasteRecognition === 'function') renderExcelPasteRecognition(recognized);
                    if (!recognized.ok) {
                        alert('\u8bf7\u5148\u9009\u62e9\u4e00\u4e2a .xlsx \u6587\u4ef6\uff0c\u6216\u7c98\u8d34\u4ece Excel \u590d\u5236\u7684\u8868\u683c\u6570\u636e');
                        return;
                    }

                    const pollToken = prepareSubmission('\u7b49\u5f85\u670d\u52a1\u5f00\u59cb\u89e3\u6790\u7c98\u8d34\u8868\u683c', '\u7c98\u8d34\u62a5\u4ef7\u4efb\u52a1\u5df2\u63d0\u4ea4');
                    quoteExcelPastedTable(trimmedTableText, document.getElementById('excelQuoteModelLabel')?.value || '', getExcelQuoteOptions())
                        .then((task) => {
                            if (task.error) throw new Error(task.message || task.error);
                            if (typeof state !== 'undefined') state.excelQuoteTaskId = task.task_id || null;
                            if (typeof syncExcelQuoteTaskUi === 'function') syncExcelQuoteTaskUi(task);
                            if (typeof pollExcelQuoteTask === 'function') pollExcelQuoteTask(task.task_id, pollToken);
                        })
                        .catch((err) => {
                            const statusNode = document.getElementById('excelQuoteStatus');
                            if (statusNode) statusNode.textContent = '\u62a5\u4ef7\u5931\u8d25';
                            alert(`\u7c98\u8d34\u8868\u683c\u62a5\u4ef7\u5931\u8d25\uff1a${err.message}`);
                        });
                };
                quoteBtn.dataset.fallbackBound = '1';
            }

            if (fileInput && fileInput.dataset.fallbackBound !== '1') {
                fileInput.addEventListener('change', function () {
                    const hasFile = !!fileInput.files?.[0];
                    if (!hasFile) return;
                    if (pasteText && String(pasteText.value || '').trim()) {
                        pasteText.value = '';
                        if (typeof renderExcelPasteRecognition === 'function') renderExcelPasteRecognition(null);
                    }
                });
                fileInput.dataset.fallbackBound = '1';
            }

            if (pasteText && pasteText.dataset.fallbackBound !== '1') {
                let timer = 0;
                const rerender = function (delay) {
                    if (fileInput?.files?.length) fileInput.value = '';
                    window.clearTimeout(timer);
                    timer = window.setTimeout(function () {
                        if (typeof analyzePastedExcelTable === 'function' && typeof renderExcelPasteRecognition === 'function') {
                            renderExcelPasteRecognition(analyzePastedExcelTable(pasteText.value || ''));
                        }
                    }, delay);
                };
                pasteText.addEventListener('input', function () { rerender(180); });
                pasteText.addEventListener('paste', function () { rerender(30); });
                pasteText.dataset.fallbackBound = '1';
            }

            if (useResultBtn && useResultBtn.dataset.fallbackBound !== '1') {
                useResultBtn.onclick = function () {
                    if (typeof state === 'undefined' || !state.lastExcelScenarioId || !state.scenarioItems[state.lastExcelScenarioId]?.length) {
                        alert('\u8fd8\u6ca1\u6709\u53ef\u67e5\u770b\u7684 Excel \u62a5\u4ef7\u7ed3\u679c');
                        return;
                    }
                    state.financeScenario = state.lastExcelScenarioId;
                    state.engineerScenario = state.lastExcelScenarioId;
                    state.activeView = 'finance';
                    state.financeModule = 'excel-quote';
                    if (typeof renderAll === 'function') renderAll();
                };
                useResultBtn.dataset.fallbackBound = '1';
            }

            if (typeof renderExcelPasteRecognition === 'function') {
                renderExcelPasteRecognition(null);
            }
        }

        bindExcelFallback();
        if (typeof bindEvents === 'function') {
            try {
                bindEvents();
            } catch (error) {
                console.error('finance-demo bindEvents failed', error);
            }
        }
        bindExcelFallback();
    } catch (error) {
        console.error('finance-demo fallback init failed', error);
    }
});
</script>
{% endblock %}
